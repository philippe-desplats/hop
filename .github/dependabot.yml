version: 2
updates:
  # Go module dependencies.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      go-modules:
        patterns: ["*"]

  # GitHub Actions: keeps SHA-pinned actions current (security patches without losing the pin).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

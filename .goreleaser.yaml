version: 2

project_name: hop

builds:
  - id: hop
    main: ./cmd/hop
    binary: hop
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: hop
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

# Software bill of materials, one per archive (syft).
sboms:
  - artifacts: archive

# Keyless cosign signature over the checksums file (OIDC in CI). cosign v3 writes
# one Sigstore bundle (.sigstore.json) instead of separate .sig/.pem files.
signs:
  - cmd: cosign
    artifacts: checksum
    output: true
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"

homebrew_casks:
  - name: hop
    repository:
      owner: philippe-desplats
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/philippe-desplats/hop"
    description: "A fast, AI-agnostic project switcher for your terminal."
    # The binaries are ad-hoc signed (Go linker) but not notarized, so a clean
    # machine's Gatekeeper rejects them once Homebrew has flagged the download
    # with com.apple.quarantine. Strip that flag on install so the CLI runs.
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/hop"]
          end
    # Shown right after `brew install`: point the user at the guided setup, which
    # prints the exact shell-integration line for their shell.
    caveats: |
      To finish setting up hop, run the guided first-run setup:
        hop setup
      It detects your project folders, editor and AI assistant, then prints the
      one line to add to your shell config (~/.zshrc, ~/.bashrc or fish).

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

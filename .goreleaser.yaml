version: 2

project_name: hop

builds:
  - id: hop
    main: ./cmd/hop
    binary: hop
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: hop
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

# Software bill of materials, one per archive (syft).
sboms:
  - artifacts: archive

# Keyless cosign signature over the checksums file (OIDC in CI). cosign v3 writes
# one Sigstore bundle (.sigstore.json) instead of separate .sig/.pem files.
signs:
  - cmd: cosign
    artifacts: checksum
    output: true
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"

homebrew_casks:
  - name: hop
    repository:
      owner: philippe-desplats
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/philippe-desplats/hop"
    description: "A fast, AI-agnostic project switcher for your terminal."

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
